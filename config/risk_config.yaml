# Risk Engine Configuration

# Redis connection for portfolio state
redis_host: "localhost"
redis_port: 6379
redis_db: 0
redis_positions_key: "robinhood:positions"

# TimescaleDB connection for historical data
timescale_host: "localhost"
timescale_port: 5432
timescale_db: "market_data"
timescale_user: "postgres"
timescale_password: ""

# Position Sizing Configuration
position_sizing:
  method: "atr"                    # "atr" or "kelly"
  risk_per_trade_pct: 0.015        # 1.5% risk per trade (tighter for sub-$2k accounts)
  atr_multiplier: 2.0              # Stop distance = ATR * multiplier
  max_position_pct: 0.15           # Maximum 15% of portfolio per position (tighter for sub-$2k)
  kelly_fraction: 0.25             # Fractional Kelly (25% of optimal)

# Portfolio Risk Limits
portfolio_risk:
  max_concentration_pct: 0.15      # Max 15% in any single position (matches max_position_pct)
  max_correlation: 0.80            # Reject if correlation > 80% with existing
  max_total_exposure_pct: 0.95     # Keep at least 5% cash
  min_cash_pct: 0.05               # Minimum cash buffer
  max_open_positions: 5            # Max concurrent open positions
  max_sector_exposure_pct: 0.40    # Max 40% of portfolio in any one sector
  max_portfolio_heat_pct: 0.08     # Max 8% total portfolio risk (sum of per-position risks)
  max_sector_positions: 2          # Max 2 concurrent positions in same sector group
  drawdown_threshold_pct: 0.10     # 10% drawdown from peak triggers size reduction
  drawdown_size_reduction: 0.50    # Halve position sizes when in drawdown
  drawdown_halt_pct: 0.15          # 15% drawdown from peak blocks all new entries

# Sector Groups — symbols grouped by correlated sector
# Used for sector concentration limits
sector_groups:
  uranium:
    - CCJ
    - URNM
    - UUUU
  precious_metals:
    - WPM
    - SLV
    - IAUM
    - PPLT
  industrial:
    - CAT
    - ETN
  rare_earth:
    - MP
  defense:
    - RTX
    - ITA
    - AVAV
  semiconductor:
    - APH
  energy:
    - XLE

# Value at Risk Configuration
var:
  enabled: false                     # Disabled until account > $10k — assumes stationary returns, crude fallback
  confidence: 0.95                 # 95% confidence level
  max_var_daily_pct: 0.05          # Max 5% daily VaR
  max_cvar_daily_pct: 0.08         # Max 8% daily CVaR
  lookback_days: 252               # 1 year of trading days

# Trade-Level Risk Checks
trade_risk:
  max_atr_pct: 0.05                # Reject if ATR > 5% of price
  require_above_sma200: true       # BUY only above 200 SMA
  min_volume_pct: 0.50             # Minimum 50% of average volume

# Capital Temperature Gauge — dynamic position sizing based on market stress
capital_temperature:
  enabled: true
  max_reduction: 0.30              # At max temperature, reduce sizes by 30%
  vix_weight: 0.60                 # VIX contributes 60% of temperature
  hy_spread_weight: 0.40           # HY spread contributes 40%
  vix_floor: 15.0                  # Below this VIX = 0 score (calm)
  vix_ceiling: 40.0                # Above this VIX = 1.0 score (crisis)
  hy_floor: 3.5                    # Below this HY = 0 score (tight)
  hy_ceiling: 8.0                  # Above this HY = 1.0 score (crisis)

# Symbol-Specific Overrides
symbol_overrides:
  MP:
    # VALIDATED 2026-03-02: 3/4 gates — half position size (Bootstrap marginal, low trade count)
    max_position_pct: 0.075        # Half of default 15% — bootstrap CI includes zero
    risk_per_trade_pct: 0.0075     # Half of default 1.5% risk per trade
    max_atr_pct: 0.08              # Allow higher volatility (rare earth miner)
  UUUU:
    # VALIDATED 2026-03-01: 2/4 gates — half position size (Walk-Forward failed)
    max_position_pct: 0.075        # Half of default 15% — unproven across full history
    risk_per_trade_pct: 0.0075     # Half of default 1.5% risk per trade
    max_atr_pct: 0.08              # Allow higher volatility (small-cap uranium)
  RTX:
    # VALIDATED 2026-03-02: 3/4 gates — half position size (only 11 trades, Bootstrap marginal)
    max_position_pct: 0.075        # Half of default 15% — low trade count needs confirmation
    risk_per_trade_pct: 0.0075     # Half of default 1.5% risk per trade
  ITA:
    # VALIDATED 2026-03-02: 3/4 gates — half position size (Bootstrap marginal p=0.0814)
    max_position_pct: 0.075        # Half of default 15% — bootstrap CI includes zero
    risk_per_trade_pct: 0.0075     # Half of default 1.5% risk per trade
  SLV:
    # VALIDATED 2026-03-01: 2/4 gates — half position size (Walk-Forward + Regime failed)
    max_position_pct: 0.075        # Half of default 15% — bull-dependent edge
    risk_per_trade_pct: 0.0075     # Half of default 1.5% risk per trade
  IAUM:
    max_position_pct: 0.25         # Stable ETF - larger position allowed
    require_above_sma200: false    # Skip trend filter for gold ETF
  SPY:
    max_position_pct: 0.30         # Index ETF - larger position allowed
    max_atr_pct: 0.03              # Tighter volatility for index

# Logging
log_level: "INFO"
